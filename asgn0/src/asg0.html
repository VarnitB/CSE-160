<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASG0 - Vector Operations</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      canvas {
        border: 1px solid #888;
        display: block;
        margin-bottom: 16px;
      }

      .controls {
        margin-bottom: 12px;
      }

      label {
        margin-right: 6px;
      }

      input, select {
        margin-right: 10px;
        margin-bottom: 8px;
      }
    </style>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <div class="controls">
      <strong>v1</strong><br>
      <label for="v1x">x:</label>
      <input type="number" id="v1x" value="2.25" step="any">

      <label for="v1y">y:</label>
      <input type="number" id="v1y" value="2.25" step="any">
    </div>

    <div class="controls">
      <strong>v2</strong><br>
      <label for="v2x">x:</label>
      <input type="number" id="v2x" value="1" step="any">

      <label for="v2y">y:</label>
      <input type="number" id="v2y" value="1" step="any">
    </div>

    <div class="controls">
      <input type="button" value="Draw" onclick="handleDrawEvent()">
    </div>

    <div class="controls">
      <label for="operation">Operation:</label>
      <select id="operation">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angleBetween">Angle between</option>
        <option value="areaTriangle">Area</option>
      </select>

      <label for="scalar">Scalar:</label>
      <input type="number" id="scalar" value="2" step="any">

      <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()">
    </div>

    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
